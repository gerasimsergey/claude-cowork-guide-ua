version: '3.8'

services:
  guide-workspace:
    build: .
    container_name: claude-guide-sandbox
    volumes:
      # Монтируем текущую папку проекта в папку /workspace внутри контейнера
      - .:/workspace
    # Оставляем контейнер запущенным (tty + stdin_open)
    tty: true
    stdin_open: true
    # Ограничиваем ресурсы для безопасности (опционально)
    deploy:
      resources:
        limits:
          memory: 512M
