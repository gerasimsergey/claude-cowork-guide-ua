<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Claude Cowork Guide - Українська локалізація</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Повний посібник з використання Claude Cowork українською мовою. Автоматизація бізнесу за допомогою ШІ.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  
  <!-- Тема (Premium Dark/Light) -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">
  
  <style>
    :root {
      --theme-color: #007AFF; /* Apple Blue */
      --base-font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      --sidebar-width: 280px;
    }
    .markdown-section {
      max-width: 850px;
    }
    .app-name-link img {
      width: 60px;
      margin-bottom: 10px;
    }
    nav.app-nav {
        margin-right: 20px;
    }
    /* Стилізація прапорів у меню */
    .app-nav li {
        font-weight: 500;
    }
  </style>
</head>
<body>
  <div id="app">Завантаження...</div>
  <script>
    window.$docsify = {
      name: 'Claude Cowork Guide 🇺🇦',
      repo: 'https://github.com/gerasimsergey/claude-cowork-guide-ua',
      homepage: 'README.md',
      loadSidebar: true,
      loadNavbar: true,
      relativePath: true,
      subMaxLevel: 2,
      auto2top: true,
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: {
          '/': 'Пошук...',
          '/guide/learning/': 'Пошук у навчанні...',
          '/en/': 'Search...',
          '/fr/': 'Rechercher...'
        },
        noData: {
          '/': 'Нічого не знайдено',
          '/en/': 'No results',
          '/fr/': 'Aucun résultat'
        }
      },
      pagination: {
        previousText: 'Назад',
        nextText: 'Далі',
        crossChapter: true,
        crossChapterText: true,
      },
      copyCode: {
        buttonText: 'Копіювати',
        errorText: 'Помилка',
        successText: 'Скопійовано'
      }
    }
  </script>
  <!-- Docsify v4 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-pagination@2/dist/docsify-pagination.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-markdown.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
</body>
</html>
